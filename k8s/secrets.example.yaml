# TEMPLATE — do NOT commit real values. Apply manually or via a sealed/external secret.
# The DB creds Secret is consumed by BOTH the Postgres StatefulSet and the bot CronJob.
apiVersion: v1
kind: Secret
metadata:
  name: gw2-postgres-creds
  namespace: trading
type: Opaque
stringData:
  POSTGRES_USER: gw2
  POSTGRES_PASSWORD: CHANGE_ME
  POSTGRES_DB: gw2
  # bot side (pg client reads these same keys via PG* env; see cronjob.yaml)
  PGUSER: gw2
  PGPASSWORD: CHANGE_ME
  PGDATABASE: gw2
---
apiVersion: v1
kind: Secret
metadata:
  name: gw2-api-key
  namespace: trading
type: Opaque
stringData:
  ARENA_NET_KEY: CHANGE_ME # ArenaNet API key with account,characters,unlocks,inventories scopes
