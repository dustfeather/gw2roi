name: build-and-push

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "data/**"
      - "Dockerfile"
      - "package.json"
      - ".github/workflows/build.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/dustfeather/gw2-crafting-roi-bot

jobs:
  typecheck:
    # Gate the image build on a passing typecheck. Reusable node-test auto-detects
    # bun from bun.lock and runs `bun run typecheck`.
    uses: dustfeather/shared-workflows/.github/workflows/node-test.yml@v4
    with:
      runner: ubuntu-latest
      run-typecheck: true
      run-lint: false
      run-test: false
      run-audit: false

  build:
    needs: typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
